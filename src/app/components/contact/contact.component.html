<section id="contact" class="contact-section section">
  <div class="container">
    <div class="text-center mb-section-title" appScrollReveal>
      <p class="section-eyebrow">Get In Touch</p>
      <h2 class="section-title">Contact Me</h2>
      <p class="section-subtitle mx-auto text-center">
        Have a project in mind or just want to say hi? My inbox is always open.
      </p>
    </div>

    <div class="row g-5">
      <div class="col-12 col-lg-5" appScrollReveal>
        <div class="contact-info surface-card h-100">
          <h3 class="mb-3">Contact Information</h3>

          <div class="contact-info__row">
            <i class="fa-solid fa-envelope"></i>
            <span>anaytrahmani1&#64;gmail.com</span>
          </div>
          <!-- <div class="contact-info__row">
            <i class="fa-solid fa-phone"></i>
            <span>+91 00000 00000</span>
          </div> -->
          <div class="contact-info__row">
            <i class="fa-solid fa-location-dot"></i>
            <span>Delhi, India</span>
          </div>

          <div class="divider-glow my-4"></div>

          <div class="d-flex gap-2">
            <a
              *ngFor="let social of socialLinks"
              class="btn-icon-circle"
              [href]="social.url"
              [attr.aria-label]="social.label"
              target="_blank"
              rel="noopener"
            >
              <i [class]="social.icon"></i>
            </a>
          </div>

          <!-- Optional map placeholder: swap for an embedded Google Map iframe -->
          <!-- <div class="contact-info__map mt-4">
            <i class="fa-solid fa-map-location-dot"></i>
            <span>Map placeholder</span>
          </div> -->
        </div>
      </div>

      <div class="col-12 col-lg-7" appScrollReveal>
        <form class="contact-form surface-card" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
          <div class="row g-3">
            <div class="col-12 col-sm-6">
              <label class="form-label" for="name">Name</label>
              <input
                id="name"
                type="text"
                class="form-control"
                formControlName="name"
                [class.is-invalid]="submitted() && f['name'].invalid"
                placeholder="Your name"
              />
              <div class="invalid-feedback" *ngIf="submitted() && f['name'].invalid">
                Please enter your name.
              </div>
            </div>

            <div class="col-12 col-sm-6">
              <label class="form-label" for="email">Email</label>
              <input
                id="email"
                type="email"
                class="form-control"
                formControlName="email"
                [class.is-invalid]="submitted() && f['email'].invalid"
                placeholder="you&#64;example.com"
              />
              <div class="invalid-feedback" *ngIf="submitted() && f['email'].invalid">
                Please enter a valid email.
              </div>
            </div>

            <div class="col-12">
              <label class="form-label" for="subject">Subject</label>
              <input
                id="subject"
                type="text"
                class="form-control"
                formControlName="subject"
                [class.is-invalid]="submitted() && f['subject'].invalid"
                placeholder="What's this about?"
              />
              <div class="invalid-feedback" *ngIf="submitted() && f['subject'].invalid">
                Please enter a subject.
              </div>
            </div>

            <div class="col-12">
              <label class="form-label" for="message">Message</label>
              <textarea
                id="message"
                rows="5"
                class="form-control"
                formControlName="message"
                [class.is-invalid]="submitted() && f['message'].invalid"
                placeholder="Tell me a bit about your project..."
              ></textarea>
              <div class="invalid-feedback" *ngIf="submitted() && f['message'].invalid">
                Message should be at least 10 characters.
              </div>
            </div>

            <div class="col-12">
              <button type="submit" class="btn-gradient w-100 w-sm-auto" [disabled]="isSubmitting()">
                <span *ngIf="!isSubmitting()"><i class="fa-solid fa-paper-plane"></i> Send Message</span>
                <span *ngIf="isSubmitting()"><i class="fa-solid fa-spinner fa-spin"></i> Sending...</span>
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
