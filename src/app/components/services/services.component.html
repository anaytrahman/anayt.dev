<section id="services" class="services-section section">
  <div class="container">
    <div class="text-center mb-section-title" appScrollReveal>
      <p class="section-eyebrow">How I Can Help</p>
      <h2 class="section-title">Services</h2>
    </div>

    <div class="row g-4">
      <div class="col-12 col-sm-6 col-lg-4" *ngFor="let service of services" appScrollReveal>
        <div class="info-card service-card">
          <div class="info-card__icon"><i [class]="service.icon"></i></div>
          <h3 class="service-card__title">{{ service.title }}</h3>
          <p class="service-card__desc">{{ service.description }}</p>
        </div>
      </div>
    </div>
  </div>
</section>
